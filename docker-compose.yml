---
services:
  heimdall-ts:
    image: tailscale/tailscale:latest
    container_name: ${STACK_NAME}-ts
    hostname: ${TS_HOSTNAME}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - "TS_EXTRA_ARGS=--advertise-tags=tag:container --reset"
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - heimdall-ts-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  heimdall-app:
    image: traefik:v3.3
    container_name: ${STACK_NAME}-app
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --log.level=INFO
      - --accesslog=true
    network_mode: service:heimdall-ts
    depends_on:
      - heimdall-ts
    environment:
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - ${TRAEFIK_DYNAMIC_CONFIG_DIR:-./traefik/dynamic}:/etc/traefik/dynamic:ro
      - heimdall-letsencrypt:/letsencrypt
    restart: unless-stopped

  heimdall-cf:
    image: cloudflare/cloudflared:latest
    container_name: ${STACK_NAME}-cf
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    network_mode: service:heimdall-ts
    depends_on:
      - heimdall-app
    restart: unless-stopped

volumes:
  heimdall-ts-state:
    name: ${STACK_NAME}-state
    driver: local

  heimdall-letsencrypt:
    name: ${STACK_NAME}-letsencrypt
    driver: local