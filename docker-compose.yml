---
services:
  heimdall-ts:
    image: tailscale/tailscale:latest
    container_name: ${STACK_NAME}-ts
    hostname: ${TS_HOSTNAME}
    network_mode: bridge
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_EXTRA_ARGS=${TS_EXTRA_ARGS:---advertise-tags=tag:container}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - heimdall-ts-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  heimdall-app:
    image: traefik:v3.3
    container_name: ${STACK_NAME}-app
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --log.level=INFO
      - --accesslog=true
    network_mode: service:heimdall-ts
    depends_on:
      - heimdall-ts
      - heimdall-routes-init
    environment:
      - TZ=${TIMEZONE:-UTC}
    volumes:
      - heimdall-traefik-dynamic:/etc/traefik/dynamic:ro
      - heimdall-letsencrypt:/letsencrypt
    restart: unless-stopped

  heimdall-routes-init:
    image: alpine:3.20
    container_name: ${STACK_NAME}-routes-init
    command:
      - /bin/sh
      - -ec
      - |
        cat > /dynamic/routes.yml <<'EOF'
        http:
          routers:
            books:
              rule: "Host(`__BOOKS_HOST__`)"
              entryPoints:
                - websecure
              service: books-svc
              tls:
                certResolver: letsencrypt

            plex:
              rule: "Host(`__PLEX_HOST__`)"
              entryPoints:
                - websecure
              service: plex-svc
              tls:
                certResolver: letsencrypt

          services:
            books-svc:
              loadBalancer:
                servers:
                  - url: "__BOOKS_URL__"

            plex-svc:
              loadBalancer:
                servers:
                  - url: "__PLEX_URL__"
        EOF
        sed -i "s|__BOOKS_HOST__|${BOOKS_HOST}|g" /dynamic/routes.yml
        sed -i "s|__PLEX_HOST__|${PLEX_HOST}|g" /dynamic/routes.yml
        sed -i "s|__BOOKS_URL__|${BOOKS_URL}|g" /dynamic/routes.yml
        sed -i "s|__PLEX_URL__|${PLEX_URL}|g" /dynamic/routes.yml
    environment:
      - BOOKS_HOST=${BOOKS_HOST}
      - PLEX_HOST=${PLEX_HOST}
      - BOOKS_URL=${BOOKS_URL}
      - PLEX_URL=${PLEX_URL}
    volumes:
      - heimdall-traefik-dynamic:/dynamic
    restart: "no"

  heimdall-cf:
    image: cloudflare/cloudflared:latest
    container_name: ${STACK_NAME}-cf
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    network_mode: service:heimdall-ts
    depends_on:
      - heimdall-app
    restart: unless-stopped

volumes:
  heimdall-ts-state:
    name: ${STACK_NAME}-state
    driver: local

  heimdall-letsencrypt:
    name: ${STACK_NAME}-letsencrypt
    driver: local

  heimdall-traefik-dynamic:
    name: ${STACK_NAME}-traefik-dynamic
    driver: local